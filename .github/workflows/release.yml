name: Tauri 自动打包发布
# 1. 仅在推送「v开头的版本标签」时触发，避免每次提交代码都打包
on:
  push:
    tags:
      - 'v*'

# 2. 彻底解决Node.js 20弃用警告，强制所有Action用Node 24运行
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 安装Node.js（和本地环境对齐）
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装Rust编译环境（指定Windows目标平台）
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 安装项目依赖（用npm ci保证100%环境一致）
        run: npm ci

      - name: 打包Tauri应用（自动签名更新包）
        run: cargo tauri build
        env:
          # 3. 必须和GitHub Secrets里的密钥名完全一致（UPDATER_KEY）
          TAURI_SIGNER_PRIVATE_KEY: ${{ secrets.UPDATER_KEY }}

      - name: 发布到GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          # 仅上传exe/msi安装包，确保自动更新能正确识别
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}