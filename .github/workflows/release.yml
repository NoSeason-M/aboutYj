name: Tauri 自动打包发布 (最终稳定版)
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUST_LOG: debug

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: 拉取完整项目代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Node.js（和本地环境对齐）
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 安装Rust编译环境（指定Windows目标平台）
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          toolchain: stable

      - name: 安装Tauri CLI工具
        run: cargo install tauri-cli --version 2.10.1
        shell: bash

      - name: 打印环境版本（调试用，确认环境正常）
        run: |
          node -v
          npm -v
          rustc -V
          cargo -V
          cargo tauri --version
        shell: bash

      - name: 安装项目依赖（npm ci保证100%环境一致）
        run: npm ci
        shell: bash

      - name: 打包Tauri应用（带详细日志+签名）
        run: cargo tauri build --verbose
        shell: bash
        env:
          TAURI_SIGNER_PRIVATE_KEY: ${{ secrets.UPDATER_KEY }}

      # 🔴 修复后的列出产物步骤（用bash兼容命令）
      - name: 列出打包产物（确认exe/msi生成成功）
        run: ls -R src-tauri/target/release/bundle
        shell: bash

      - name: 发布到GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}